<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ประวัติการลงเวลา — SSB</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#4A7C3F;--green-d:#2d5a24;--green-l:#D6E8D0;--green-pale:#EEF7EB;
  --brown:#8B7355;--cream:#F5F0E8;--cream2:#EDE7D9;--cream3:#FDFAF5;
  --text:#2C3E1F;--text-m:#5C6B4A;--text-l:#8B9E7A;
  --border:rgba(74,124,63,.18);--red:#DC2626;--orange:#EA8C2B;--amber:#F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;padding-bottom:30px}
.hdr{background:linear-gradient(135deg,var(--green-d),var(--green));padding:16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.hdr-back{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;border:none;cursor:pointer;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:600;color:#fff;margin:0}
.hdr p{font-size:11px;color:var(--green-l);margin:2px 0 0}
.body{padding:16px;max-width:480px;margin:0 auto}

.user-card{background:var(--green-l);border:.5px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.uc-avatar{width:44px;height:44px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.uc-name{font-size:15px;font-weight:600}
.uc-sub{font-size:12px;color:var(--text-m);margin-top:2px}

/* สรุป */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sum-box{background:var(--cream3);border:.5px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.sum-num{font-size:22px;font-weight:700;line-height:1}
.sum-lbl{font-size:10px;color:var(--text-m);margin-top:5px}
.sum-work .sum-num{color:var(--green)}
.sum-leave .sum-num{color:var(--amber)}
.sum-up .sum-num{color:var(--brown)}

.month-label{font-size:12px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.05em;margin:4px 2px 10px}

/* รายการวัน */
.day{background:var(--cream3);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px}
.day-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.day-date{font-size:14px;font-weight:600}
.day-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.bg-ok{background:var(--green-pale);color:var(--green-d)}
.bg-warn{background:#FEF3C7;color:#92400E}
.bg-up{background:#EFE6DA;color:var(--brown)}
.day-times{display:flex;gap:16px;margin-top:8px;font-size:13px}
.dt{display:flex;align-items:center;gap:5px;color:var(--text-m)}
.dt b{color:var(--text);font-weight:600}
.dt .miss{color:var(--red);font-weight:600}
.day-hours{margin-left:auto;font-size:13px;color:var(--green);font-weight:600}
.btn-edit{margin-top:10px;width:100%;background:#fff;border:1px solid var(--orange);color:var(--orange);border-radius:9px;padding:8px;font-size:13px;font-weight:600;font-family:'Sarabun',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-edit:active{background:#FFF7ED}

.empty{text-align:center;color:var(--text-l);padding:40px 20px;font-size:14px}
.loading{text-align:center;padding:50px 20px;color:var(--text-m)}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--green-l);border-top-color:var(--green);animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal ขอแก้เวลา */
.modal{display:none;position:fixed;inset:0;background:rgba(44,62,31,.45);z-index:100;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.sheet{background:var(--cream);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:20px 18px 28px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:16px;font-weight:700;margin-bottom:4px}
.sheet .sub{font-size:12px;color:var(--text-m);margin-bottom:16px}
.fld{margin-bottom:14px}
.fld label{font-size:12px;color:var(--text-m);display:block;margin-bottom:6px}
.fld input,.fld textarea{width:100%;font-family:'Sarabun',sans-serif;font-size:15px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);outline:none}
.fld input:focus,.fld textarea:focus{border-color:var(--green)}
.modal-btns{display:flex;gap:10px;margin-top:6px}
.mbtn{flex:1;padding:13px;border-radius:11px;font-size:15px;font-weight:600;font-family:'Sarabun',sans-serif;border:none;cursor:pointer}
.mbtn-cancel{background:var(--cream2);color:var(--text-m)}
.mbtn-send{background:var(--green);color:#fff}
.mbtn-send:disabled{opacity:.5}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <button class="hdr-back" onclick="goBack()">←</button>
  <div><h1>ประวัติการลงเวลา</h1><p>SSB Smart Supply</p></div>
</div>

<div class="body">
  <div class="user-card">
    <div class="uc-avatar">🚛</div>
    <div>
      <div class="uc-name" id="uname">กำลังโหลด...</div>
      <div class="uc-sub" id="usub">—</div>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="sum-box sum-work"><div class="sum-num" id="s-work">0</div><div class="sum-lbl">วันทำงาน</div></div>
    <div class="sum-box sum-up"><div class="sum-num" id="s-up">0</div><div class="sum-lbl">ต่างจังหวัด</div></div>
    <div class="sum-box sum-leave"><div class="sum-num" id="s-leave">0</div><div class="sum-lbl">วันลา</div></div>
  </div>

  <div class="month-label" id="month-label" style="display:none">📅 ย้อนหลัง 1 เดือน</div>

  <div id="list">
    <div class="loading"><div class="spinner"></div>กำลังโหลดประวัติ...</div>
  </div>
</div>

<!-- Modal ขอแก้เวลา -->
<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="modal-title">ขอแก้เวลา</h3>
    <div class="sub" id="modal-sub">—</div>
    <div class="fld" id="fld-in" style="display:none">
      <label>เวลาเข้างาน</label>
      <input type="time" id="inp-in">
    </div>
    <div class="fld" id="fld-out" style="display:none">
      <label>เวลาออกงาน</label>
      <input type="time" id="inp-out">
    </div>
    <div class="fld">
      <label>เหตุผล <span style="color:var(--red)">*</span></label>
      <textarea id="inp-reason" rows="2" placeholder="เช่น ลืมสแกน, มือถือแบตหมด..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="mbtn mbtn-send" id="btn-send" onclick="sendEditRequest()">ส่งคำขอ</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw4UvKuRrAQ_3Ldm8U0VJqfjfBQUSYaTEdrxkdXUVN98G68XseCquhDeXfMgU8cVYaY/exec';
const LIFF_ID = '2010274217-auqyTo6l';        // LIFF หน้าประวัติ
const ATTENDANCE_LIFF = '2010274217-UYCm7EXk'; // LIFF หน้าลงเวลา (กดกลับ)
let U = {};
let _editing = null;   // {date, status}

// ── กลับหน้าลงเวลา ──
function goBack() {
  window.location.href = 'https://liff.line.me/' + ATTENDANCE_LIFF;
}

// ── Init ──
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    U.userId = p.userId;
    _loadHistory();
  } catch(e) {
    // เปิดนอก LINE → ลองใช้ userId จาก URL (เผื่อทดสอบ)
    const uid = new URLSearchParams(location.search).get('userId');
    if (uid) { U.userId = uid; _loadHistory(); }
    else {
      document.getElementById('list').innerHTML =
        '<div class="empty">⚠️ กรุณาเปิดผ่าน LINE</div>';
      document.getElementById('uname').textContent = 'เปิดผ่าน LINE';
    }
  }
}

// ── โหลดประวัติ ──
async function _loadHistory() {
  try {
    const r = await fetch(`${GAS_URL}?action=getAttendanceHistory&userId=${U.userId}`).then(r => r.json());
    if (!r.success) {
      document.getElementById('list').innerHTML =
        '<div class="empty">❌ ' + (r.error || 'โหลดไม่สำเร็จ') + '</div>';
      return;
    }
    document.getElementById('uname').textContent = r.name || 'คนขับ';
    document.getElementById('usub').textContent  = r.plate || '—';

    // สรุป
    document.getElementById('s-work').textContent  = r.summary.workDays;
    document.getElementById('s-up').textContent    = r.summary.upcountry;
    document.getElementById('s-leave').textContent = r.summary.leaveDays;
    document.getElementById('summary').style.display = 'grid';
    document.getElementById('month-label').style.display = 'block';

    _renderList(r.records || []);
  } catch(e) {
    document.getElementById('list').innerHTML =
      '<div class="empty">❌ เชื่อมต่อไม่ได้</div>';
  }
}

// ── แสดงรายการ ──
function _renderList(records) {
  const list = document.getElementById('list');
  if (!records.length) {
    list.innerHTML = '<div class="empty">📭 ยังไม่มีประวัติการลงเวลา</div>';
    return;
  }
  list.innerHTML = '';
  records.forEach(rec => {
    const div = document.createElement('div');
    div.className = 'day';

    // badge ตามสถานะ
    let badge = '', badgeCls = '';
    if (rec.status === 'complete')      { badge = '✅ ครบ';        badgeCls = 'bg-ok'; }
    else if (rec.status === 'upcountry'){ badge = '🚛 ต่างจังหวัด'; badgeCls = 'bg-up'; }
    else if (rec.status === 'noCheckout'){ badge = '⚠️ ลืมออก';    badgeCls = 'bg-warn'; }
    else if (rec.status === 'noCheckin'){ badge = '⚠️ ลืมเข้า';     badgeCls = 'bg-warn'; }
    else                                { badge = '— ไม่ครบ';      badgeCls = 'bg-warn'; }

    // เวลา (เติม น. หลังเวลา)
    const inTxt  = rec.checkIn  ? `<b>${rec.checkIn} น.</b>` : `<span class="miss">--</span>`;
    const outTxt = rec.status === 'upcountry'
      ? `<b>ต่างจังหวัด</b>`
      : (rec.checkOut ? `<b>${rec.checkOut} น.</b>` : `<span class="miss">--</span>`);
    const hoursTxt = (rec.hours !== '' && rec.hours != null && rec.status !== 'upcountry')
      ? `<span class="day-hours">${rec.hours} ชม.</span>` : '';

    let html = `
      <div class="day-top">
        <span class="day-date">${_fmtDate(rec.date)}</span>
        <span class="day-badge ${badgeCls}">${badge}</span>
      </div>
      <div class="day-times">
        <span class="dt">🟢 เข้า ${inTxt}</span>
        <span class="dt">🔴 ออก ${outTxt}</span>
        ${hoursTxt}
      </div>`;

    // ปุ่มขอแก้ — เฉพาะวันที่ลืมเข้า/ลืมออก/ไม่ครบ (ไม่ใช่ต่างจังหวัด)
    if (rec.status === 'noCheckout' || rec.status === 'noCheckin' || rec.status === 'incomplete') {
      const label = rec.status === 'noCheckin' ? 'ขอเพิ่มเวลาเข้า'
                  : rec.status === 'noCheckout' ? 'ขอแก้เวลาออก'
                  : 'ขอลงเวลา';
      html += `<button class="btn-edit" onclick='openModal(${JSON.stringify(rec)})'>✏️ ${label}</button>`;
    }

    div.innerHTML = html;
    list.appendChild(div);
  });
}

// ── จัดรูปแบบวันที่ d/M/yyyy → "26 มิ.ย." ──
const THMON = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function _fmtDate(s) {
  const p = String(s).split('/');
  if (p.length !== 3) return s;
  const d = parseInt(p[0]), m = parseInt(p[1]) - 1;
  const y = (parseInt(p[2]) + 543) % 100;
  return `${d} ${THMON[m] || ''} ${y}`;
}

// ── เปิด Modal ขอแก้เวลา ──
function openModal(rec) {
  _editing = rec;
  const fldIn  = document.getElementById('fld-in');
  const fldOut = document.getElementById('fld-out');
  fldIn.style.display = 'none';
  fldOut.style.display = 'none';
  document.getElementById('inp-reason').value = '';

  let title = 'ขอแก้เวลา', sub = _fmtDate(rec.date);
  if (rec.status === 'noCheckin') {
    title = 'ขอเพิ่มเวลาเข้า';
    sub = `${_fmtDate(rec.date)} · ออก ${rec.checkOut ? rec.checkOut + ' น.' : '--'}`;
    fldIn.style.display = 'block';
  } else if (rec.status === 'noCheckout') {
    title = 'ขอแก้เวลาออก';
    sub = `${_fmtDate(rec.date)} · เข้า ${rec.checkIn ? rec.checkIn + ' น.' : '--'}`;
    fldOut.style.display = 'block';
  } else {
    title = 'ขอลงเวลา';
    sub = _fmtDate(rec.date);
    fldIn.style.display = 'block';
    fldOut.style.display = 'block';
  }
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-sub').textContent = sub;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  _editing = null;
}

// ── ส่งคำขอแก้เวลา ──
async function sendEditRequest() {
  if (!_editing) return;
  const reason = document.getElementById('inp-reason').value.trim();
  const newIn  = document.getElementById('inp-in').value;
  const newOut = document.getElementById('inp-out').value;

  if (!reason) { showToast('กรุณากรอกเหตุผล'); return; }
  if (document.getElementById('fld-in').style.display !== 'none' && !newIn)  { showToast('กรุณาระบุเวลาเข้า'); return; }
  if (document.getElementById('fld-out').style.display !== 'none' && !newOut){ showToast('กรุณาระบุเวลาออก'); return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';

  try {
    const r = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'attendanceEditRequest',
        userId: U.userId,
        date: _editing.date,
        editType: _editing.status,   // noCheckin / noCheckout / incomplete
        newCheckIn: newIn || '',
        newCheckOut: newOut || '',
        reason: reason
      })
    }).then(r => r.json());

    if (r.success) {
      closeModal();
      showToast('✅ ส่งคำขอแล้ว รอแอดมินอนุมัติ');
    } else {
      showToast('❌ ' + (r.error || 'ส่งไม่สำเร็จ'));
    }
  } catch(e) {
    showToast('❌ เชื่อมต่อไม่ได้');
  } finally {
    btn.disabled = false; btn.textContent = 'ส่งคำขอ';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

init();
</script>
</body>
</html>
